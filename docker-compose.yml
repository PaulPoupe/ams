services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      TZ: Europe/Warsaw
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fastapi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      TZ: Europe/Warsaw
      ASR_MODEL: base
      ASR_ENGINE: faster_whisper

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      TZ: Europe/Warsaw
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fastapi_db}
      WHISPER_API_URL: http://whisper:9000
      CORS_ALLOW_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80,http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./backend/storage/audio:/app/storage/audio
    depends_on:
      db:
        condition: service_healthy
      whisper:
        condition: service_started
    ports:
      - "${UDP_PUBLISHED_PORT:-5000}:5000/udp"

  frontend-main:
    build:
      context: ./fronend-main
    restart: unless-stopped

  gateway:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend-main:
        condition: service_started
    ports:
      - "${HTTP_PUBLISHED_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
